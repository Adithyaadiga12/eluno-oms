<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Eluno OMS{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="font-semibold text-lg text-slate-900 flex items-center gap-2">
                <span class="w-7 h-7 rounded-md bg-indigo-600 text-white grid place-items-center text-sm">E</span>
                Eluno <span class="text-indigo-600">OMS</span>
            </a>
            <div class="flex gap-6 text-sm font-medium text-slate-600">
                <a href="/" class="hover:text-indigo-600">Dashboard</a>
                <a href="/orders/new" class="hover:text-indigo-600">New Order</a>
                <a href="/inventory" class="hover:text-indigo-600">Inventory</a>
                <a href="/tat-scan" class="hover:text-indigo-600">TAT Scan</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
